<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - AUBazaar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">...</nav>
    <div class="container py-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <img id="avatar" src="https://via.placeholder.com/150" class="rounded-circle mx-auto mb-3" width="150">
                    <h4 id="fullName"></h4>
                    <p id="email"></p>
                    <p id="userType"></p>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4">
                    <h5>Edit Profile</h5>
                    <form id="profileForm">
                        <div class="mb-3"><label>Full Name</label><input type="text" id="full_name" class="form-control"></div>
                        <div class="mb-3"><label>Department</label><input type="text" id="department" class="form-control"></div>
                        <div class="mb-3"><label>Phone</label><input type="text" id="phone" class="form-control"></div>
                        <div class="mb-3"><label>Graduation Year</label><input type="number" id="graduation_year" class="form-control"></div>
                        <button type="submit" class="btn-primary-custom">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        loadProfile();
        document.getElementById('profileForm').addEventListener('submit', updateProfile);
    </script>
</body>
</html>
