<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AUBazaar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 24px; padding: 40px; max-width: 450px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo-container { position: absolute; top: 20px; left: 20px; }
        .btn-primary-custom { background: #C41E3A; color: white; width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 600; }
        .btn-primary-custom:hover { background: #9B152C; }
        .form-control { border-radius: 12px; padding: 12px; }
    </style>
</head>
<body>
    <div class="logo-container">
        <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <div class="logo-icon" style="background: #C41E3A; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: white;"><i class="fas fa-university"></i></div>
            <div class="logo-text" style="font-size: 1.8rem; font-weight: 800; color: white;"><span>AU</span><span style="color: #C41E3A;">Bazaar</span></div>
        </a>
    </div>
    <div class="login-card">
        <h2 class="text-center mb-2">Welcome back</h2>
        <p class="text-center text-muted">Sign in to continue</p>
        <form id="loginForm">
            <div class="mb-3"><label class="form-label">University Email</label><input type="email" id="email" class="form-control" placeholder="name@africa.edu" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" required></div>
            <div id="message" class="alert d-none"></div>
            <button type="submit" class="btn-primary-custom">Sign in</button>
            <div class="text-center mt-3">Don't have an account? <a href="register.html">Create one</a></div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
